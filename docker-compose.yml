# Phase 1.4 — docker-compose(开发环境)
# 用途:起 redis:7-alpine,Session store + Socket.IO adapter 共享
#
# Phase 10 起追加:
#   - nginx (反代)
#   - backend: garment-server-nest (NestJS,镜像构建)
#   - legacy:  garment-server (Express 旧,Phase 11 下线)
#   - frontend: garment-web (Vue 构建产物,Nginx 服务)
#
# 数据:
#   - SQLite 文件挂 volume(./garment-server/data.sqlite → /app/data/data.sqlite)
#   - Redis 数据不持久化(缓存用途,重启即丢,符合 §8.1 配置)

services:
  redis:
    image: redis:7-alpine
    container_name: garment-redis
    restart: unless-stopped
    # §8.1 配置:maxmemory 128mb,appendonly no
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

