# Phase 10.2 — 前端 nginx 配置
#
# 反代:
#   - /api/* /api/* → backend(NestJS 3002)
#   - /socket.io/* → backend(WebSocket)
# 其余 → / 前端静态(nginx:80)

upstream garment-backend {
    server backend:3002;
}

# Express 旧后端(Phase 11 下线前保留,warehouse/asn/dn 模块)
upstream garment-legacy {
    server legacy:3001;
}

server {
    listen 80;
    server_name _;

    # gzip 压缩(JS/CSS)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # WebSocket 反代(NestJS 端,Phase 11 迁移完整时再用)
    location /socket.io/ {
        proxy_pass http://garment-backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Phase 10 Socket.IO 默认 Express(legacy),Phase 11 改 backend
        # proxy_pass http://garment-legacy/socket.io/;
    }

    # NestJS 已迁模块(按 §6.3 backend-routing.js)
    location /api/auth/        { proxy_pass http://garment-backend; }
    location /api/system/      { proxy_pass http://garment-backend; }
    location /api/styles/      { proxy_pass http://garment-backend; }
    location /api/main-plan/   { proxy_pass http://garment-backend; }
    location /api/schedule/    { proxy_pass http://garment-backend; }
    location /api/report/      { proxy_pass http://garment-backend; }
    location /api/actual/      { proxy_pass http://garment-backend; }

    # Express 旧模块(Phase 11 下线前保留)
    location /api/warehouse/   { proxy_pass http://garment-legacy; }
    location /api/asn/         { proxy_pass http://garment-legacy; }
    location /api/dn/          { proxy_pass http://garment-legacy; }
    location /api/workshops/   { proxy_pass http://garment-legacy; }
    location /api/production-lines/ { proxy_pass http://garment-legacy; }
    location /api/work-calendars/ { proxy_pass http://garment-legacy; }
    # ... 其他 Phase 9 暂未迁的 Express 端点

    # SPA fallback:所有未匹配路径返回 index.html(让 Vue Router 处理)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}