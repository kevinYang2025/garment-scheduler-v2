# garment-scheduler-v2 — 生产 Nginx 反代配置
# 文件路径(部署到服务器后): /etc/nginx/sites-available/garment
# 启用: sudo ln -s /etc/nginx/sites-available/garment /etc/nginx/sites-enabled/
#       sudo rm -f /etc/nginx/sites-enabled/default
#       sudo nginx -t && sudo systemctl reload nginx
# 配合 Cloudflare Origin Certificate(15 年),TLS 由 CF 边缘终结 → origin 全程 CF↔Origin 是私密的

# 上游 Node.js
upstream garment_backend {
    server 127.0.0.1:3001;
    keepalive 16;
    keepalive_timeout 60s;
}

# ============ 80 → 443 跳转 ============
server {
    listen 80;
    listen [::]:80;
    server_name garment.example.com;

    # 给未来切 Let's Encrypt HTTP-01 留余地
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============ 443 HTTPS ============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name garment.example.com;

    # ---- TLS (Cloudflare Origin Certificate) ----
    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: SPA 同源 + 自家 wss
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ---- 限流 ----
    limit_req_zone $binary_remote_addr zone=login:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=import:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/s;
    limit_req_status 429;

    # 与 Express 10mb 略放宽容错
    client_max_body_size 12m;

    # ---- 日志 ----
    access_log /opt/garment/logs/nginx-access.log;
    error_log  /opt/garment/logs/nginx-error.log warn;

    # ---- 静态 SPA(由 Nginx 直服务 dist/,不走 Express catch-all)----
    root /opt/garment/app/garment-scheduler-v2/garment-web/dist;
    index index.html;

    # Hashed assets: 长期缓存(Vite 文件名带 hash,1 年安全)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html: 必须总是拉新版
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA fallback(hash router 也兼容)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- /api/* 反代 ----
    location /api/ {
        limit_req zone=api burst=120 nodelay;

        # 登录端点更严限流
        location ~ ^/api/auth/login$ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://garment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 导入端点严限流
        location ~ ^/api/.+/import$ {
            limit_req zone=import burst=3 nodelay;
            proxy_pass http://garment_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        proxy_pass http://garment_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- /socket.io/* WebSocket 反代(必须显式 Upgrade 头)----
    location /socket.io/ {
        proxy_pass http://garment_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
